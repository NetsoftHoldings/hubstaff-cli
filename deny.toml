[advisories]
ignore = []

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "MPL-2.0",
    "CDLA-Permissive-2.0",
    "Unicode-3.0",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
skip = [
    "getrandom@0.2.17",
    "windows-sys@0.52.0",
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
